name: 15 - Working with Matrices
on:
    workflow_dispatch: 
jobs:
     backwards-compatibility:
        name: ${{ matrix.os }}-${{ matrix.node-version }}
        strategy:
            fail-fast: false
            matrix:  
                node-version: [18.x, 20.x, 21.x]
                os:
                    - ubuntu-latest
                    - windows-latest
                include:
                    - os: ubuntu-latest
                      tag: linux
                      node-version: 16.x
                    - os: ubuntu-latest
                      node-version: 21.x
                      tag: "experimental"
                   
        runs-on: ${{ matrix.os }}
        steps:
            - name: setup Node
              uses: actions/setup-node@v4
              with:
                node: ${{ matrix.node-version }}
            - name: fail if experimental
              if: matrix.tag == 'experimental'
              run: exit 0
            - name: sleep
              run: sleep 10
            - name: Upload Test Results
              run: |
               echo "Uploading test results"
     include-example:
        name: ${{ matrix.color }}-${{ matrix.shape }}-${{ matrix.size}}-${{ matrix.opacity }}
        runs-on: ubuntu-latest
        strategy:
          matrix:

            color:
                - red
                - green
            shape:
                - circle
                - square
            size:
                - small
                - large
            include:
              - opacity: 50
              - color: red
                opacity: 75
              - shape: circle
                opacity: 100
              - color: red
                shape: triangle
              - color: green
                shape: circle
                size: medium
            exclude:
              - color: green
              - shape: circle
              
        steps:
            - name: Dummy Step
              run: echo "${{ matrix.color }}-${{ matrix.shape }}-${{ matrix.size}}-${{ matrix.opacity }}"  





                