name:  13 - Using Caching
on:
  workflow_dispatch:
   inputs:
     node-version:
        type: choice
        options:
          - 18.x
          - 20.x
          - 21.x
        default: 20.x


jobs:
  build:
    runs-on: ubuntu-latest
    needs: install-deps
    defaults:
      run:
        working-directory: 13-caching/react-app
    steps:
      - name: Checkout Code
        uses: actions/Checkout@v4
      - name: setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - name: Download cached dependencies
        id: cache
        uses: actions/cache@v3
        with:
            path: 13-caching/react-app/node_modules
            key: ${{ needs.install-deps.outputs.deps-cache-key }}
      - name: testing
        run: npm run test
      - name: Building
        run: npm run build
      - name: Deploying to nonprod
        run: echo "deploying to non prod"
  install-deps:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 13-caching/react-app
    outputs:
        deps-cache-key: ${{ steps.cache-key.outputs.CACHE_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/Checkout@v4
      - name: setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - name:  Calculate Cache key
        id: cache-key
        run: |
         echo "CACHE_KEY=deps-node-modules-${{ hashFiles('13-caching/react-app/package-lock.json') }}" >> "$GITHUB_OUTPUT"
      - name: Download cached dependencies
        id: cache
        if: ${{ steps.cache-key.outputs.CACHE_KEY }}
        uses: actions/cache@v3
        with:
            path: 13-caching/react-app/node_modules
            key: deps-node-modules-${{ hashFiles('13-caching/react-app/package-lock.json') }}
      - name: Install Dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
  linting:
    runs-on: ubuntu-latest
    needs: install-deps
    defaults:
      run:
        working-directory: 13-caching/react-app
    steps:
      - name: Checkout Code
        uses: actions/Checkout@v4
      - name: setup Node
        uses: actions/setup-node@v4

      - name: Download cached dependencies
        uses: actions/cache@v3
        with:
            path: 13-caching/react-app/node_modules
            key: ${{ needs.install-deps.outputs.deps-cache-key }}
      - name: testing
        run : npm run test
      - name: linting
        run: echo "linting......"