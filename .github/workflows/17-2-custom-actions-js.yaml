name: 17 - 2 - Custom Actions - JS
run-name: "17 - 2 - Custom Actions - JS Base Branch: ${{ inputs.base-branch }} Target-Branch: ${{ inputs.target-branch }} working-dir: ${{ inputs.working-dir }}"
on:
    workflow_dispatch: 
        inputs:
            base-branch:
                type: string
                default: 'main'
            target-branch:
                type: string
            working-dir:
                type: string
                default: '17-custom-actions/react-app'
            debug:
                type: boolean

permissions:
    contents: write
    pull-requests: write

jobs:
    dependency-update:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/Checkout@v4 
            - name: Check for dependency updates
              uses: ./.github/actions/js-dependency-update
              with:
                base-branch: ${{ inputs.base-branch }}
                target-branch: ${{ inputs.target-branch }}
                working-directory: ${{ inputs.working-dir }}
                debug: ${{ inputs.debug }}
                gh-token: ${{ secrets.GITHUB_TOKEN }}