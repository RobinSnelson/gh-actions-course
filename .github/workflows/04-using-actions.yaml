name: 04 - Using Actions
on: workflow_dispatch

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/Checkout@v4
            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                node-version: 20.x
            - name: Install Dependencies
              run: |
                cd 04-using-actions/react-app
                npm ci
                
            