name: 04 - Using Actions
on: push

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/Checkout@v4
            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                node-version: 20.x
            - name: Install Dependencies
              working-directory: 04-github-actions/react-app
              run: npm ci
             
            